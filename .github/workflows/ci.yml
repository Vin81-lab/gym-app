name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ✅ ADD THIS STEP
      - name: Run Tests
        run: PYTHONPATH=. pytest

      # 🔽 Only runs if tests pass
      - name: Build Docker Image
        run: docker build -t gym-app .

      - name: Run Container
        run: docker run -d -p 5000:5000 gym-app

      - name: Wait for App
        run: sleep 5

      - name: Test App
        run: curl http://localhost:5000

