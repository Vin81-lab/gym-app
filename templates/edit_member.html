<!DOCTYPE html>
<html>
<head>
    <title>Edit Member</title>
</head>
<body>

<h2>Edit Member</h2>

<form method="POST">
    <input type="text" name="name" value="{{ member.name }}"><br><br>
    <input type="number" name="age" value="{{ member.age }}"><br><br>
    <input type="text" name="plan" value="{{ member.plan }}"><br><br>
    <button type="submit">Update</button>
</form>

</body>

{% extends 'base.html' %}

{% block content %}

<h2>Edit Member</h2>

<form method="POST" class="row g-3">
    <div class="col-md-4">
        <input type="text" name="name" value="{{ member.name }}" class="form-control">
    </div>

    <div class="col-md-3">
        <input type="number" name="age" value="{{ member.age }}" class="form-control">
    </div>

    <div class="col-md-3">
        <input type="text" name="plan" value="{{ member.plan }}" class="form-control">
    </div>

    <div class="col-md-2">
        <button type="submit" class="btn btn-success w-100">Update</button>
    </div>
</form>

{% endblock %}
